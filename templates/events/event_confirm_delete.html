{% extends "base.html" %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap');

  body {
    background: radial-gradient(1200px 600px at 10% -10%, #dbeafe 0%, transparent 60%),
                radial-gradient(900px 500px at 110% 0%, #ffe4e6 0%, transparent 60%),
                #f8fafc;
  }

  .ev-confirm {
    font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  .ev-danger {
    background: #ffffff;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    border: 1px solid rgba(248, 113, 113, 0.35);
  }

  .ev-danger h3 {
    font-family: "Fraunces", serif;
  }
</style>

<div class="container py-4 ev-confirm" style="max-width: 760px;">
  <div class="ev-danger">
    <div class="d-flex align-items-center gap-2 mb-2 text-danger">
      <i class="bi bi-exclamation-triangle"></i>
      <strong>Suppression</strong>
    </div>
    <h3 class="mb-2">Supprimer l'&eacute;v&eacute;nement</h3>

    <p class="text-muted">Tu es s&ucirc;r de vouloir supprimer :</p>
    <p class="fw-semibold mb-4">{{ event.title }}</p>

    <form method="post" class="d-flex flex-wrap gap-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">
        Oui, supprimer
      </button>
      <a class="btn btn-outline-secondary" href="{% url 'events:detail' event.pk %}">
        Annuler
      </a>
    </form>
  </div>
</div>

{% endblock %}
