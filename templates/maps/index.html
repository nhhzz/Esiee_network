{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap');

  body {
    background: radial-gradient(1200px 600px at 10% -10%, #dbeafe 0%, transparent 60%),
                radial-gradient(900px 500px at 110% 0%, #ffe4e6 0%, transparent 60%),
                #f8fafc;
  }

  .map-wrap {
    font-family: "Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  .map-hero {
    background: linear-gradient(120deg, #0f172a 0%, #1e293b 55%, #0f172a 100%);
    color: #e2e8f0;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
  }

  .map-hero h1 {
    font-family: "Fraunces", serif;
  }

  .map-card {
    background: #ffffff;
    border-radius: 16px;
    border: 1px solid rgba(148, 163, 184, 0.25);
    padding: 16px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  }

  .map-container {
    position: relative;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
  }

  .map-image {
    width: 100%;
    height: auto;
    display: block;
  }

  .map-dot {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #f97316;
    border: 2px solid #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.18);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .map-dot:hover {
    transform: scale(1.15);
    box-shadow: 0 0 0 10px rgba(249, 115, 22, 0.22);
  }
</style>

<div class="container py-4 map-wrap">
  <div class="map-hero mb-4">
    <div class="row align-items-center g-3">
      <div class="col-lg-8">
        <h1 class="mb-2">Carte ESIEE</h1>
        <p class="mb-0 text-light opacity-75">
          Rep&egrave;re les lieux cl&eacute;s et acc&egrave;de aux &eacute;v&eacute;nements en un clic.
        </p>
      </div>
      <div class="col-lg-4 text-lg-end">
        <a href="{% url 'events:list' %}" class="btn btn-warning fw-semibold">
          <i class="bi bi-calendar-event me-1"></i> Voir l'agenda
        </a>
      </div>
    </div>
  </div>

  <div class="map-card">
    <div class="map-container mx-auto">
      <img src="{% static 'img/esiee_plan.jpg' %}"
           alt="Plan ESIEE"
           class="img-fluid map-image">

      {% if user.is_authenticated %}
        <a href="{% url 'events:list' %}?location=DEJEUNERS" class="map-dot" style="top: 43%; left: 8%;" title="D&eacute;jeuners"></a>
        <a href="{% url 'events:list' %}?location=RESTAURANT" class="map-dot" style="top: 34%; left: 10%;" title="Restaurant"></a>
        <a href="{% url 'events:list' %}?location=CAFETERIA" class="map-dot" style="top: 27%; left: 12%;" title="Caf&eacute;t&eacute;ria"></a>
        <a href="{% url 'events:list' %}?location=GYMNASE" class="map-dot" style="top: 12%; left: 11%;" title="Gymnase"></a>

        <a href="{% url 'events:list' %}?location=AMPHI_DASSAULT" class="map-dot" style="top: 34%; left: 25%;" title="Amphi M. Dassault"></a>
        <a href="{% url 'events:list' %}?location=EPI5" class="map-dot" style="top: 25%; left: 34%;" title="Epi 5"></a>
        <a href="{% url 'events:list' %}?location=EXPOSES" class="map-dot" style="top: 40%; left: 37%;" title="Expos&eacute;s"></a>

        <a href="{% url 'events:list' %}?location=AMPHI" class="map-dot" style="top: 32%; left: 45%;" title="Amphi"></a>
        <a href="{% url 'events:list' %}?location=ACCUEIL" class="map-dot" style="top: 22%; left: 50%;" title="Accueil"></a>
        <a href="{% url 'events:list' %}?location=PORTE_PRINCIPALE" class="map-dot" style="top: 41%; left: 50%;" title="Porte principale"></a>

        <a href="{% url 'events:list' %}?location=EPI2" class="map-dot" style="top: 31%; left: 60%;" title="Epi 2"></a>
        <a href="{% url 'events:list' %}?location=BIBLIOTHEQUE" class="map-dot" style="top: 39%; left: 68%;" title="Biblioth&egrave;que"></a>
        <a href="{% url 'events:list' %}?location=POSTE_NORD" class="map-dot" style="top: 47%; left: 73%;" title="Poste Nord"></a>

        <a href="{% url 'events:list' %}?location=PORTE_NORD" class="map-dot" style="top: 30%; left: 82%;" title="Porte Nord"></a>
        <a href="{% url 'events:list' %}?location=PORTE_NORD" class="map-dot" style="top: 22%; left: 88%;" title="Porte Nord (haut)"></a>
        <a href="{% url 'events:list' %}?location=ROND_POINT" class="map-dot" style="top: 40%; left: 90%;" title="Rond-Point"></a>
      {% else %}
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 43%; left: 8%;" title="D&eacute;jeuners"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 34%; left: 10%;" title="Restaurant"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 27%; left: 12%;" title="Caf&eacute;t&eacute;ria"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 12%; left: 11%;" title="Gymnase"></a>

        <a href="{% url 'users:login' %}" class="map-dot" style="top: 34%; left: 25%;" title="Amphi M. Dassault"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 25%; left: 34%;" title="Epi 5"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 40%; left: 37%;" title="Expos&eacute;s"></a>

        <a href="{% url 'users:login' %}" class="map-dot" style="top: 32%; left: 45%;" title="Amphi"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 22%; left: 50%;" title="Accueil"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 41%; left: 50%;" title="Porte principale"></a>

        <a href="{% url 'users:login' %}" class="map-dot" style="top: 31%; left: 60%;" title="Epi 2"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 39%; left: 68%;" title="Biblioth&egrave;que"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 47%; left: 73%;" title="Poste Nord"></a>

        <a href="{% url 'users:login' %}" class="map-dot" style="top: 30%; left: 82%;" title="Porte Nord"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 22%; left: 88%;" title="Porte Nord (haut)"></a>
        <a href="{% url 'users:login' %}" class="map-dot" style="top: 40%; left: 90%;" title="Rond-Point"></a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
