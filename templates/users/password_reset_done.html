{% extends 'base.html' %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<div class="container py-4 py-md-5" style="max-width: 760px;">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
    <div class="text-light p-4 p-md-5" style="background: linear-gradient(110deg, #0f193b 0%, #182d57 55%, #223f72 100%);">
      <h1 class="h2 fw-bold mb-2">
        <i class="bi bi-envelope-check-fill me-2"></i>
        E-mail envoy&eacute;
      </h1>
      <p class="mb-0 text-light opacity-75">
        Si un compte existe, un lien de r&eacute;initialisation a &eacute;t&eacute; envoy&eacute;.
      </p>
    </div>

    <div class="card-body p-4 p-md-5">
      <p class="mb-4">
        V&eacute;rifie ta bo&icirc;te e-mail et clique sur le lien re&ccedil;u pour changer ton mot de passe.
      </p>
      <a href="{% url 'users:login' %}" class="btn btn-outline-primary">
        Retour &agrave; la connexion
      </a>
    </div>
  </div>
</div>
{% endblock %}
