{% extends 'base.html' %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<div class="container py-4 py-md-5" style="max-width: 760px;">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
    <div class="text-light p-4 p-md-5" style="background: linear-gradient(110deg, #0f193b 0%, #182d57 55%, #223f72 100%);">
      <h1 class="h2 fw-bold mb-2">
        <i class="bi bi-check-circle-fill me-2"></i>
        Mot de passe mis &agrave; jour
      </h1>
      <p class="mb-0 text-light opacity-75">
        Ton nouveau mot de passe est enregistr&eacute;.
      </p>
    </div>

    <div class="card-body p-4 p-md-5">
      <a href="{% url 'users:login' %}" class="btn btn-primary">
        Se connecter maintenant
      </a>
    </div>
  </div>
</div>
{% endblock %}
